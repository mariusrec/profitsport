*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

#bottomnav{height:60px;background:var(--bg2);border-top:1px solid var(--border);display:flex;flex-shrink:0;}

.loading-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg);flex-direction:column;gap:16px;}
.loading-screen .logo-icon{width:48px;height:48px;border-radius:12px;font-size:22px;display:flex;align-items:center;justify-content:center;background:var(--green);color:var(--bg);font-weight:900;}

// ═══════════════════════════════════════════════
// SUPABASE HELPERS
// ═══════════════════════════════════════════════
async function loadBets() {
  if (!state.user) return;
  const {data} = await sb.from('bets').select('*').eq('user_id', state.user.id).order('created_at', {ascending:false});
  if (data) state.bets = data.map(b => ({...b, bm: b.bookmaker, back: b.back_odds, lay: b.lay_odds, fromScan: b.from_scan}));
}

async function loadBookmakers() {
  if (!state.user) return;
  const {data} = await sb.from('bookmakers').select('*').eq('user_id', state.user.id).order('created_at');
  if (data && data.length > 0) {
    state.bookmakers = data;
  } else {
    // create default bookmakers for new user
    const toInsert = DEFAULT_BOOKMAKERS.map(bm => ({...bm, user_id: state.user.id}));
    const {data: created} = await sb.from('bookmakers').insert(toInsert).select();
    if (created) state.bookmakers = created;
  }
}

async function saveBet(bet) {
  const {data} = await sb.from('bets').insert({
    user_id: state.user.id,
    bookmaker: bet.bm,
    type: bet.type,
    match: bet.match,
    back_odds: parseFloat(bet.back)||0,
    lay_odds: parseFloat(bet.lay)||0,
    stake: parseFloat(bet.stake)||0,
    profit: parseFloat(bet.profit)||0,
    status: parseFloat(bet.profit) > 0 ? 'won' : parseFloat(bet.profit) < 0 ? 'lost' : 'pending',
    date: new Date().toLocaleDateString('ro'),
    from_scan: bet.fromScan || false,
  }).select().single();
  if (data) state.bets.unshift({...data, bm: data.bookmaker, back: data.back_odds, lay: data.lay_odds, fromScan: data.from_scan});
}

async function updateBookmakerBalance(id, balance) {
  await sb.from('bookmakers').update({balance: parseFloat(balance)||0}).eq('id', id);
  const bm = state.bookmakers.find(b => b.id === id);
  if (bm) bm.balance = parseFloat(balance)||0;
}

  await loadBets();
  await loadBookmakers();
  render();
}

}

async function handleAuth() {
  const email = document.getElementById('auth-email')?.value || state.authEmail;

  if (!email || !pass) { state.authError = 'Completează email-ul și parola.'; render(); return; }

  else await signUp(email, pass);
}

// ═══════════════════════════════════════════════
// CALCULATOR
// ═══════════════════════════════════════════════
function calcResult() {
  const bsN=parseFloat(state.calcBS)||0,boN=parseFloat(state.calcBO)||0,loN=parseFloat(state.calcLO)||0,comN=(parseFloat(state.calcCom)||0)/100;
  if(!bsN||!boN||loN<=1)return null;
  let ls;
  if(state.calcType==='SNR')ls=(bsN*(boN-1))/(loN*(1-comN));
  else if(state.calcType==='SR')ls=(bsN*boN)/(loN*(1-comN));
  else ls=(bsN*boN)/(loN*(1-comN));
  const liab=ls*(loN-1);
  let pBack,pLay;
  if(state.calcType==='SNR'){pBack=(boN-1)*bsN-ls*(loN-1);pLay=ls*(1-comN);}
  else if(state.calcType==='SR'){pBack=boN*bsN-ls*(loN-1)-bsN;pLay=ls*(1-comN)-bsN;}
  else{pBack=(boN-1)*bsN-ls*(loN-1);pLay=ls*(1-comN)-bsN;}
  return{ls:ls.toFixed(2),liab:liab.toFixed(2),pBack:pBack.toFixed(2),pLay:pLay.toFixed(2)};
}

function renderTracker() {
  const bets = state.bets;
  const total = bets.reduce((s,b)=>s+(parseFloat(b.profit)||0),0);
  const won = bets.filter(b=>parseFloat(b.profit)>0).length;
  const byBm = {};
  bets.forEach(b=>{byBm[b.bm]=(byBm[b.bm]||0)+(parseFloat(b.profit)||0);});
  const sortedBm = Object.entries(byBm).sort((a,b)=>b[1]-a[1]);
  const maxBm = Math.max(1,...Object.values(byBm).map(Math.abs));
  return `
    <div style="padding:14px 14px 24px;">
      <div class="stat-grid">
        ${[
          {l:'Profit Total',v:(total>=0?'+':'')+total.toFixed(0)+' RON',c:'var(--green)'},
          {l:'Pariuri',v:bets.length,c:'var(--text)'},
          {l:'Rata Win',v:bets.length?Math.round((won/bets.length)*100)+'%':'—',c:'var(--amber)'},

function toggleAddBet() { state.showAddBet=!state.showAddBet; render(); }
async function saveNewBet() {
  const match=document.getElementById('add-match')?.value;
  const profit=parseFloat(document.getElementById('add-profit')?.value);
  if(!match||isNaN(profit))return;
  const bet={
    bm:document.getElementById('add-bm')?.value||'Superbet',
    type:document.getElementById('add-type')?.value||'Freebet SNR',
    match,back:document.getElementById('add-back')?.value||0,
    lay:document.getElementById('add-lay')?.value||0,
    stake:0,profit,fromScan:false,
  };
  await saveBet(bet);
  state.showAddBet=false;
  render();
}

// ═══════════════════════════════════════════════
// SCANNER
// ═══════════════════════════════════════════════
function renderScan() {
  return `
    <div style="padding:14px 14px 24px;">
      <div style="font-weight:800;font-size:1.05rem;margin-bottom:4px;">Scanner Bon</div>
      <div style="font-size:.8rem;color:var(--muted);margin-bottom:14px;">Fotografiază orice bon — AI extrage automat toate detaliile.</div>
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        ${state.scanning?'<div class="scan-line"></div>':''}
        <div style="font-size:2.5rem;margin-bottom:10px;">${state.scanning?'🔍':'📤'}</div>
        <div style="font-weight:700;font-size:.95rem;margin-bottom:5px;">${state.scanning?(state.scanProgress||'Se analizează...'):'Adaugă screenshot-uri'}</div>
        <div style="font-size:.78rem;color:var(--muted);line-height:1.6;">${state.scanning?'AI-ul analizează bonul...':'Apasă sau trage fișierele\nJPG, PNG acceptate'}</div>
      </div>
      <input type="file" id="file-input" accept="image/*" multiple style="display:none;" onchange="handleFiles(this.files)">
      ${state.scanImages.length>0?`
        <div style="margin-bottom:14px;">
          <div class="sec-label">${state.scanImages.length} imagine${state.scanImages.length>1?'i':''} adăugat${state.scanImages.length>1?'e':''}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${state.scanImages.map((img,i)=>`
              <div class="preview-item">
                <img src="${img.preview}" alt="">
                <div style="position:absolute;top:0;left:0;right:0;background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent);padding:3px 5px;font-size:.58rem;color:white;font-weight:700;">#${i+1}</div>
                <button onclick="removeImage(${i})" style="position:absolute;bottom:3px;right:3px;width:18px;height:18px;border-radius:50%;background:var(--red);border:none;color:white;font-size:.65rem;cursor:pointer;font-weight:900;display:flex;align-items:center;justify-content:center;">×</button>
              </div>
            `).join('')}
            ${!state.scanning?`<button onclick="document.getElementById('file-input').click()" style="width:76px;height:96px;border-radius:9px;border:2px dashed var(--border2);background:transparent;color:var(--muted);font-size:1.3rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;"><span>+</span><span style="font-size:.55rem;font-weight:700;text-transform:uppercase;">Adaugă</span></button>`:''}
          </div>
        </div>
      `:''}
      <div class="hint-box" style="background:var(--bdim);border:1px solid rgba(56,189,248,.15);margin-bottom:12px;">
        <span>💡</span><div style="font-size:.76rem;line-height:1.6;"><strong style="color:var(--blue);">Bon lung?</strong> Adaugă toate screenshot-urile în ordine. AI-ul le combină automat.</div>
      </div>
      ${state.scanError?`<div style="background:var(--rdim);border:1px solid rgba(255,77,77,.18);border-radius:10px;padding:10px 13px;margin-bottom:12px;font-size:.8rem;color:var(--red);">⚠️ ${state.scanError}</div>`:''}
      <button onclick="analyzeImages()" ${state.scanning||!state.scanImages.length?'disabled':''} style="width:100%;padding:14px;border-radius:12px;border:none;background:${state.scanning||!state.scanImages.length?'var(--muted2)':'var(--green)'};color:${state.scanning||!state.scanImages.length?'var(--muted)':'var(--bg)'};font-weight:800;font-size:.95rem;cursor:${state.scanning||!state.scanImages.length?'default':'pointer'};margin-bottom:8px;font-family:var(--font);${!state.scanning&&state.scanImages.length?'box-shadow:0 0 18px var(--gglow);':''}">
        ${state.scanning?'⏳ Se analizează...':'🔍 Analizează '+( state.scanImages.length?state.scanImages.length+' imagine'+(state.scanImages.length>1?'i':''):'Bon')}

      <button onclick="loadDemo()" style="width:100%;padding:11px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-weight:500;font-size:.82rem;cursor:pointer;font-family:var(--font);">Demo — testează cu bon exemplu</button>

  `;

function bindScan() {
  const dz=document.getElementById('drop-zone');
  if(dz){dz.addEventListener('dragover',e=>e.preventDefault());dz.addEventListener('drop',e=>{e.preventDefault();handleFiles(e.dataTransfer.files);});}
}
function removeImage(i){state.scanImages.splice(i,1);render();}
function handleFiles(files){
  Array.from(files).forEach(f=>{
    if(!f.type.startsWith('image/'))return;
    const r=new FileReader();
    r.onload=e=>{state.scanImages.push({preview:URL.createObjectURL(f),base64:e.target.result.split(',')[1],type:f.type});render();};
    r.readAsDataURL(f);
  });
  state.scanError='';
}
async function analyzeImages(){
  if(!state.scanImages.length)return;
  state.scanning=true;state.scanError='';state.scanProgress='Se analizează imaginile...';render();
  try{
    const imgContent=state.scanImages.map(img=>({type:'image',source:{type:'base64',media_type:img.type,data:img.base64}}));
    state.scanProgress='AI procesează bonul...';render();
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:2000,
      messages:[{role:'user',content:[...imgContent,{type:'text',text:`Analizează bonul de pariu din imagine și returnează STRICT JSON valid (fără text extra, fără backticks):
{"bookmaker":"Superbet/Betano/Unibet/Fortuna/MaxBet/TotoGaming/altul","date":"DD.MM.YYYY sau null","betType":"Simplu|Acumulator|Sistem|Freebet","rawType":"descriere","stake":numar,"totalOdds":numar,"potentialWin":numar,"isFreebet":true/false,"confidence":0.0-1.0,"selections":[{"match":"Echipa1 vs Echipa2","market":"tip piata","pick":"selectia","odds":numar,"sport":"Fotbal|Tenis|Baschet|altul","status":"pending|won|lost"}],"notes":"observatii sau null"}`}]}]
    })});
    const data=await resp.json();
    if(data.error)throw new Error(data.error.message);
    const text=data.content?.find(b=>b.type==='text')?.text||'';
    let parsed;
    try{parsed=JSON.parse(text.replace(/```json|```/g,'').trim());}
    catch{throw new Error('Imagine neclară. Încearcă un screenshot mai bun.');}
    const slip=Array.isArray(parsed)?parsed[0]:parsed;
    if(!slip?.bookmaker&&!slip?.selections)throw new Error('Nu am găsit date despre pariu.');
    const withId={...slip,id:Date.now(),images:state.scanImages.map(i=>i.preview)};
    state.scanResult=withId;
    if(slip.stake){
      await saveBet({bm:slip.bookmaker||'—',type:slip.betType||'—',match:slip.selections?.[0]?.match||'Bon scanat',back:slip.totalOdds||0,lay:0,stake:slip.stake,profit:0,fromScan:true});
    }
    state.scanning=false;state.scanView='result';render();
  }catch(err){
    state.scanning=false;state.scanError=err.message||'Eroare. Încearcă din nou.';render();
  }
}

        <div><div style="font-size:.76rem;font-weight:700;color:${confColor};">Precizie: ${Math.round(conf*100)}%</div><div style="font-size:.68rem;color:var(--muted);margin-top:2px;">${conf>.8?'Toate câmpurile citite cu succes':'Verifică câmpurile marcate'}</div></div>

        <div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
          <div style="display:flex;gap:9px;align-items:center;"><span style="font-size:1.3rem;">${BM_ICON[slip.bookmaker]||'📋'}</span><div><div style="font-weight:800;font-size:.95rem;">${slip.bookmaker||'—'}</div><div style="font-size:.68rem;color:var(--muted);margin-top:1px;">${slip.date||'—'}</div></div></div>
          <span style="background:${tc}18;border:1px solid ${tc}28;border-radius:7px;padding:3px 9px;font-size:.72rem;font-weight:700;color:${tc};">${slip.betType}</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border);">
          ${[{l:'Miză',v:slip.stake!=null?slip.stake+' RON':'—',c:'var(--text)'},{l:'Cotă',v:slip.totalOdds!=null?'×'+slip.totalOdds:'—',c:'var(--amber)'},{l:'Câștig',v:slip.potentialWin!=null?slip.potentialWin+' RON':'—',c:'var(--green)'}].map((f,i)=>`<div style="padding:12px;text-align:center;${i<2?'border-right:1px solid var(--border);':''}"><div style="font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;">${f.l}</div><div style="font-family:var(--mono);font-size:.9rem;color:${f.c};">${f.v}</div></div>`).join('')}
        </div>
        <div style="padding:13px 15px;">
          <div class="sec-label">${slip.selections?.length||0} Selecții</div>
          ${slip.selections?.map(s=>`
            <div style="background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:6px;border-left:3px solid ${s.status==='won'?'var(--green)':s.status==='lost'?'var(--red)':'var(--border2)'};">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;">
                <div style="flex:1;min-width:0;"><div style="font-size:.78rem;font-weight:700;margin-bottom:2px;">${s.match||'—'}</div><div style="font-size:.68rem;color:var(--muted);">${s.market||'—'}</div></div>
                ${s.odds?`<span style="font-family:var(--mono);font-size:.82rem;color:var(--amber);margin-left:8px;flex-shrink:0;">×${s.odds}</span>`:''}
              </div>
              <span style="background:rgba(26,224,90,.08);border:1px solid rgba(26,224,90,.15);border-radius:5px;padding:2px 8px;font-size:.7rem;color:var(--green);font-weight:600;">${s.pick||'—'}</span>
            </div>
          `).join('')||''}
        </div>
      </div>
      <div style="background:var(--gdim);border:1px solid rgba(26,224,90,.18);border-radius:10px;padding:10px 13px;margin-bottom:10px;font-size:.76rem;color:var(--muted);display:flex;gap:7px;align-items:center;">
        <span>✅</span><span>Bonul a fost adăugat automat în <strong style="color:var(--text);">Profit</strong>.</span>
      </div>
      <button onclick="newScan()" class="btn-primary glow">+ Scanează Alt Bon</button>
    </div>
  `;
}
function newScan(){state.scanView='upload';state.scanImages=[];state.scanResult=null;state.scanError='';render();}

async function updateBalance(id,val){

  // re-render just total
  const totalEl=document.querySelector('[data-total-balance]');
  if(totalEl)totalEl.textContent='Total: '+state.bookmakers.reduce((s,b)=>s+(parseFloat(b.balance)||0),0).toFixed(0)+' RON';

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
async function init(){
  document.getElementById('root').innerHTML=renderLoading();
  const {data:{session}}=await sb.auth.getSession();
  if(session?.user){
    state.user=session.user;
    await loadBets();
    await loadBookmakers();
  }
  state.loading=false;
  render();

  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session?.user){
      state.user=session.user;
      await loadBets();
      await loadBookmakers();
      render();
    }else if(event==='SIGNED_OUT'){
      state.user=null;state.bets=[];state.bookmakers=[];render();
    }
  });
}

init();
</script>
