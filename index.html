<!DOCTYPE html>

<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ProfitSport — Matched Betting Romania</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Figtree:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#08100A;--bg2:#0C150E;--bg3:#101A12;
  --card:#141E16;--card2:#192019;--card3:#1E271E;
  --border:#1E2E20;--border2:#253528;--border3:#2E4030;
  --green:#1AE05A;--green2:#15C24E;--green3:#0FA040;
  --gdim:rgba(26,224,90,0.10);--gglow:rgba(26,224,90,0.22);
  --amber:#F5A623;--adim:rgba(245,166,35,0.10);
  --red:#FF4D4D;--rdim:rgba(255,77,77,0.10);
  --blue:#38BDF8;--bdim:rgba(56,189,248,0.10);
  --purple:#C084FC;--pdim:rgba(192,132,252,0.10);
  --teal:#2DD4BF;
  --text:#D4E8D4;--muted:#4E6850;--muted2:#364E38;
  --font:'Figtree',sans-serif;--mono:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;}
button,input,select,textarea{font-family:var(--font);color:var(--text);}
input,select,textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 10px;outline:none;font-size:.9rem;width:100%;}
select option{background:var(--bg3);}
::-webkit-scrollbar{width:2px;height:2px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px;}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;}
/* TOP BAR */
#topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;position:relative;z-index:50;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-icon{width:24px;height:24px;background:var(--green);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#08100A;font-weight:900;}
.logo-text{font-weight:900;font-size:.98rem;letter-spacing:-.5px;}
.logo-text span{color:var(--green);}
.trial-badge{background:var(--gdim);border:1px solid rgba(26,224,90,.15);color:var(--green);font-size:.58rem;font-weight:800;padding:2px 7px;border-radius:99px;letter-spacing:.8px;text-transform:uppercase;}
.top-right{display:flex;align-items:center;gap:10px;}
.profit-pill{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:4px 10px;font-family:var(--mono);font-size:.78rem;color:var(--green);}
.notif-btn{background:none;border:none;cursor:pointer;font-size:1.1rem;padding:4px;position:relative;}
.notif-badge{position:absolute;top:0;right:0;width:13px;height:13px;background:var(--red);border-radius:99px;font-size:.55rem;font-weight:800;color:white;display:flex;align-items:center;justify-content:center;}
/* CONTENT */
#content{flex:1;overflow-y:auto;overflow-x:hidden;}
/* BOTTOM NAV */
#bottomnav{height:60px;background:var(--bg2);border-top:1px solid var(--border);display:flex;flex-shrink:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;cursor:pointer;color:var(--muted);transition:color .15s;padding:6px 0;position:relative;}
.nav-btn.active{color:var(--green);}
.nav-btn.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:2px;background:var(--green);border-radius:1px;}
.nav-icon{font-size:1.1rem;transition:font-size .15s;}
.nav-btn.active .nav-icon{font-size:1.25rem;}
.nav-label{font-size:.6rem;font-weight:400;letter-spacing:.2px;}
.nav-btn.active .nav-label{font-weight:700;}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;}
.card2{background:var(--card2);border:1px solid var(--border2);border-radius:14px;padding:14px;}
/* SECTION LABEL */
.sec-label{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;font-weight:700;margin-bottom:8px;}
/* CHIP */
.chip{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:2px 7px;font-size:.65rem;color:var(--muted);}
/* PROFIT PILL */
.profit-tag{background:var(--gdim);border:1px solid rgba(26,224,90,.18);border-radius:8px;padding:4px 9px;font-family:var(--mono);font-size:.78rem;color:var(--green);}
/* FILTER CHIPS */
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{flex-shrink:0;padding:5px 13px;border-radius:99px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:.72rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font);}
.filter-chip.active{border-color:var(--green);background:var(--gdim);color:var(--green);}
/* OFFER CARD */
.offer-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:9px;cursor:pointer;width:100%;text-align:left;font-family:var(--font);transition:border-color .15s;}
.offer-card:hover{border-color:var(--border3);}
.offer-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.offer-bm-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.offer-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.offer-footer{display:flex;align-items:center;gap:6px;}
.offer-progress{flex:1;height:3px;background:var(--border);border-radius:99px;overflow:hidden;}
.offer-progress-bar{height:100%;border-radius:99px;}
/* STEP DOTS */
.step-dots{display:flex;gap:6px;justify-content:center;margin-bottom:14px;}
.step-dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--border2);background:transparent;color:var(--muted);font-weight:900;font-size:.78rem;cursor:pointer;transition:all .2s;font-family:var(--font);}
.step-dot.active{border-color:var(--green);background:var(--gdim);color:var(--green);}
.step-dot.done{border-color:var(--green);background:var(--green);color:var(--bg);}
/* CALC */
.calc-type-row{display:flex;gap:4px;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:14px;}
.calc-type-btn{flex:1;padding:7px 4px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-weight:400;font-size:.72rem;cursor:pointer;transition:all .15s;font-family:var(--font);}
.calc-type-btn.active{background:var(--card3);color:var(--green);font-weight:700;}
.field-row{display:flex;gap:8px;margin-bottom:10px;}
.field{flex:1;}
.field label{display:block;font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;font-weight:700;}
.field input{font-family:var(--mono);font-size:.95rem;}
.result-box{background:var(--gdim);border:1px solid rgba(26,224,90,.2);border-radius:10px;padding:13px 15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.result-main{font-family:var(--mono);font-size:1.6rem;color:var(--green);line-height:1;}
.result-main span{font-size:1rem;opacity:.7;}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.result-cell{background:var(--bg3);border-radius:8px;padding:11px;text-align:center;}
.result-cell-label{font-size:.62rem;color:var(--muted);margin-bottom:5px;line-height:1.3;}
.result-cell-val{font-family:var(--mono);font-size:.95rem;font-weight:500;}
/* TRACKER */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.stat-cell{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px;text-align:center;}
.bm-bar-row{margin-bottom:9px;}
.bm-bar-track{background:var(--border);border-radius:99px;height:3px;overflow:hidden;margin-top:3px;}
.bm-bar-fill{height:100%;border-radius:99px;transition:width .5s ease;}
.bet-row{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 13px;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
/* SCANNER */
.drop-zone{border:2px dashed var(--border2);border-radius:16px;padding:28px 20px;text-align:center;cursor:pointer;background:var(--card);position:relative;overflow:hidden;margin-bottom:14px;}
.preview-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.preview-item{position:relative;width:76px;height:96px;border-radius:9px;overflow:hidden;border:1px solid var(--border2);flex-shrink:0;}
.preview-item img{width:100%;height:100%;object-fit:cover;}
.preview-num{position:absolute;top:0;left:0;right:0;background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent);padding:3px 5px;font-size:.58rem;color:white;font-weight:700;}
.preview-del{position:absolute;bottom:3px;right:3px;width:18px;height:18px;border-radius:50%;background:var(--red);border:none;color:white;font-size:.65rem;cursor:pointer;font-weight:900;display:flex;align-items:center;justify-content:center;}
/* SCAN LINE */
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent);box-shadow:0 0 10px var(--green);pointer-events:none;animation:scanMove 2s ease-in-out infinite;}
@keyframes scanMove{0%{top:-2px;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}
/* RESULT */
.slip-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.financials{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border);}
.fin-cell{padding:12px;text-align:center;}
.fin-cell:not(:last-child){border-right:1px solid var(--border);}
.sel-card{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:6px;}
/* PROFILE */
.toggle-switch{width:38px;height:20px;border-radius:99px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle-knob{position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:white;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
/* NOTIF PANEL */
#notif-panel{position:absolute;top:52px;right:0;left:0;z-index:100;display:none;}
#notif-panel.open{display:block;}
.notif-inner{position:absolute;right:12px;top:4px;width:290px;background:var(--card3);border:1px solid var(--border3);border-radius:14px;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.6);}
/* BUTTONS */
.btn-primary{background:var(--green);color:var(--bg);border:none;border-radius:10px;padding:13px;font-weight:800;font-size:.9rem;cursor:pointer;width:100%;font-family:var(--font);}
.btn-secondary{background:transparent;color:var(--muted);border:1px solid var(--border2);border-radius:10px;padding:13px;font-weight:600;font-size:.9rem;cursor:pointer;width:100%;font-family:var(--font);}
.btn-back{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.82rem;display:flex;align-items:center;gap:5px;margin-bottom:14px;font-family:var(--font);padding:0;}
/* PROGRESS BAR */
.progress-track{background:var(--border);border-radius:99px;height:5px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--green2));border-radius:99px;transition:width .4s ease;}
/* HINT BOX */
.hint-box{border-radius:10px;padding:10px 13px;display:flex;gap:8px;align-items:flex-start;margin-bottom:12px;}
/* FORM */
.form-row{display:flex;gap:8px;margin-bottom:8px;}
/* FADE UP */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp .2s ease both;}
/* GLOW */
.glow{box-shadow:0 0 18px var(--gglow);}
/* SCAN LOADING */
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{display:inline-block;animation:spin 1s linear infinite;}
</style>
</head>

</div>

// ═══════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════

  updateTopBar();
  updateNotifPanel();
  const content = document.getElementById('content');
  content.innerHTML = '';

  if (state.tab === 'offers') {
    if (state.offerGuide) {
      document.getElementById('back-btn').style.display = 'block';
      content.innerHTML = renderOfferGuide();
    } else {
      document.getElementById('back-btn').style.display = 'none';
      content.innerHTML = renderOffers();
    }
  } else if (state.tab === 'calc') {
    document.getElementById('back-btn').style.display = 'none';
    content.innerHTML = renderCalc();
    bindCalc();
  } else if (state.tab === 'tracker') {
    document.getElementById('back-btn').style.display = 'none';
    content.innerHTML = renderTracker();
    bindTracker();
  } else if (state.tab === 'scan') {
    document.getElementById('back-btn').style.display = 'none';
    if (state.scanView === 'result' && state.scanResult) {
      content.innerHTML = renderScanResult();
    } else {
      content.innerHTML = renderScan();
      bindScan();
    }
  } else if (state.tab === 'profile') {
    document.getElementById('back-btn').style.display = 'none';
    content.innerHTML = renderProfile();
  }

  // update nav
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const navEl = document.getElementById('nav-' + state.tab);
  if (navEl) navEl.classList.add('active');
}

function updateTopBar() {
  const total = state.bets.reduce((s,b) => s + b.profit, 0);
  document.getElementById('total-profit-display').textContent = (total >= 0 ? '+' : '') + total.toFixed(0) + ' RON';
  const unread = state.notifications.filter(n => !n.read).length;
  const badge = document.getElementById('notif-count');
  badge.textContent = unread;
  badge.style.display = unread > 0 ? 'flex' : 'none';

function updateNotifPanel() {

function navigate(tab) {
  state.tab = tab;
  state.offerGuide = null;
  state.scanView = 'upload';
  state.showAddBet = false;
  render();
}

function goBack() {
  if (state.offerGuide) { state.offerGuide = null; render(); return; }
  if (state.scanView === 'result') { state.scanView = 'upload'; render(); return; }
}

function toggleNotif() {
  state.notifOpen = !state.notifOpen;
  const panel = document.getElementById('notif-panel');
  if (state.notifOpen) {
    panel.classList.add('open');
    state.notifications = state.notifications.map(n => ({...n, read: true}));

// ═══════════════════════════════════════════════
// CALCULATOR
// ═══════════════════════════════════════════════
function calcResult(type, bs, bo, lo, com) {
  const bsN=parseFloat(bs)||0, boN=parseFloat(bo)||0, loN=parseFloat(lo)||0, comN=(parseFloat(com)||0)/100;
  if (!bsN || !boN || loN <= 1) return null;
  let ls;
  if (type==='SNR') ls=(bsN*(boN-1))/(loN*(1-comN));
  else if (type==='SR') ls=(bsN*boN)/(loN*(1-comN));
  else ls=(bsN*boN)/(loN*(1-comN));
  const liab = ls*(loN-1);
  let pBack, pLay;
  if (type==='SNR'){pBack=(boN-1)*bsN-ls*(loN-1);pLay=ls*(1-comN);}
  else if (type==='SR'){pBack=boN*bsN-ls*(loN-1)-bsN;pLay=ls*(1-comN)-bsN;}
  else{pBack=(boN-1)*bsN-ls*(loN-1);pLay=ls*(1-comN)-bsN;}
  return {ls:ls.toFixed(2),liab:liab.toFixed(2),pBack:pBack.toFixed(2),pLay:pLay.toFixed(2)};
}

  if (!match || isNaN(profit)) return;
  state.bets.push({
    id: Date.now(),
    date: new Date().toLocaleDateString('ro'),
    bm: document.getElementById('add-bm')?.value || 'Superbet',
    type: document.getElementById('add-type')?.value || 'Freebet SNR',
    match,
    back: parseFloat(document.getElementById('add-back')?.value)||0,
    lay: parseFloat(document.getElementById('add-lay')?.value)||0,
    stake: 0,
    profit,
    status: profit >= 0 ? 'won' : 'lost',
  });
  state.showAddBet = false;
  render();
}

function bindScan() {
  const dz = document.getElementById('drop-zone');
  if (dz) {
    dz.addEventListener('dragover', e => e.preventDefault());
    dz.addEventListener('drop', e => { e.preventDefault(); handleFiles(e.dataTransfer.files); });
  }
}

function removeImage(i) {
  state.scanImages.splice(i, 1);
  render();
}

function handleFiles(files) {
  const arr = Array.from(files);
  let processed = 0;
  arr.forEach(f => {
    if (!f.type.startsWith('image/') && f.type !== 'application/pdf') return;
    const reader = new FileReader();
    reader.onload = e => {
      const base64 = e.target.result.split(',')[1];
      const preview = URL.createObjectURL(f);
      state.scanImages.push({preview, base64, type: f.type});
      processed++;
      if (processed === arr.length) render();
    };
    reader.readAsDataURL(f);
  });
  state.scanError = '';
}

async function analyzeImages() {
  if (!state.scanImages.length) return;
  state.scanning = true;
  state.scanError = '';
  state.scanProgress = 'Se analizează imaginile...';
  render();

  try {
    const imgContent = state.scanImages.map(img => ({
      type: 'image',
      source: {type:'base64', media_type: img.type==='application/pdf'?'image/jpeg':img.type, data: img.base64}
    }));

    state.scanProgress = 'AI procesează bonul...';
    render();

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        messages: [{
          role: 'user',
          content: [...imgContent, {type:'text', text:`Ești expert în analiza bonurilor de pariuri sportive românești. Analizează imaginile și extrage datele din bon.

Returnează STRICT JSON valid (fără text suplimentar, fără markdown, fără backticks):
{"bookmaker":"Superbet/Betano/Unibet/Fortuna/MaxBet/TotoGaming/altul","date":"DD.MM.YYYY sau null","betType":"Simplu|Acumulator|Sistem|Freebet","rawType":"descriere exactă","stake":numar_sau_null,"totalOdds":numar_sau_null,"potentialWin":numar_sau_null,"isFreebet":true/false,"confidence":0.0-1.0,"selections":[{"match":"Echipa1 vs Echipa2","market":"tip piata","pick":"selectia exacta","odds":numar_sau_null,"sport":"Fotbal|Tenis|Baschet|altul","status":"pending|won|lost|void"}],"notes":"observatii sau null"}`}]
        }]
      })
    });

    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || 'Eroare API');
    const text = data.content?.find(b => b.type==='text')?.text || '';
    let parsed;
    try { parsed = JSON.parse(text.replace(/```json|```/g,'').trim()); }
    catch { throw new Error('Imagine neclară. Încearcă un screenshot mai bun.'); }
    const slip = Array.isArray(parsed) ? parsed[0] : parsed;
    if (!slip?.bookmaker && !slip?.selections) throw new Error('Nu am găsit date despre pariu în imagine.');

    const withId = {...slip, id: Date.now(), images: state.scanImages.map(i=>i.preview), savedAt: new Date().toISOString()};
    state.scanResult = withId;

    // add to tracker
    if (slip.stake && slip.potentialWin) {
      state.bets.push({
        id: Date.now()+1,
        date: slip.date || new Date().toLocaleDateString('ro'),
        bm: slip.bookmaker || '—',
        type: slip.betType || '—',
        match: slip.selections?.[0]?.match || 'Bon scanat',
        back: slip.totalOdds || 0,
        lay: 0, stake: slip.stake, profit: 0, status: 'pending', fromScan: true,
      });
    }

    state.scanning = false;
    state.scanView = 'result';
    document.getElementById('back-btn').style.display = 'block';
    render();

  } catch(err) {
    state.scanning = false;
    state.scanError = err.message || 'A apărut o eroare. Încearcă din nou.';
    render();
  }
}
